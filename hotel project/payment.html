<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .payment-container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .form-label {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container payment-container">
    <h2 class="text-center text-primary mb-4">Room Payment</h2>

<form action="process_payment.php" method="POST">
    <div class="mb-3">
        <label for="roomType" class="form-label">Select Room Type</label>
        <select class="form-select" id="roomType" name="room_type" required>
            <option value="">Choose a room</option>
            <option value="Junior Suite">Junior Suite - ₹8,500</option>
            <option value="Elegance Suite">Elegance Suite - ₹21,300</option>
            <option value="Serenity Suite">Serenity Suite - ₹42,700</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="text" class="form-control" id="amount" name="amount" readonly>
    </div>

    <div class="mb-3">
        <label class="form-label">Cardholder Name</label>
        <input type="text" class="form-control" name="card_name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Card Number</label>
        <input type="text" class="form-control" name="card_number" pattern="\d{10}" placeholder="xx xxxx xxxx" required maxlength="10">
    </div>
    

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Expiry Date</label>
            <input type="text" class="form-control" name="expiry_date"  placeholder="MM/YY" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">CVV</label>
            <input type="password" class="form-control" pattern="\d{3}" name="cvv" maxlength="3" placeholder="123" required >
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-100">Pay Now</button>
</form>


<!-- Bootstrap & JavaScript -->
<script>
    const roomType = document.getElementById("roomType");
    const amountField = document.getElementById("amount");

    roomType.addEventListener("change", function () {
        const prices = {
            "Junior Suite": "₹8,500",
            "Elegance Suite": "₹21,300",
            "Serenity Suite": "₹42,700"
        };
        amountField.value = prices[this.value] || "";
    });

    document.getElementById("paymentForm").addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Payment Successful!");
        this.reset();
        amountField.value = "";
    });
</script>
</body>
</html>
